syntax = "proto3";

package wfa.measurement.storage;

import "google/protobuf/timestamp.proto";
import "google/type/date.proto";

option java_package = "org.wfanet.measurement.storage";
option java_multiple_files = true;

// Serialization format for a single parquet row exchanged through
// `ParquetStorageClient.read()` / `ParquetStorageClient.writeBlob()`.
//
// A row is a flat, single-value mapping from parquet column name to a typed
// value. Nested (group-typed) and REPEATED columns are not representable.
message ParquetRow {
  // Column name -> value. A column absent from this map (or carrying a
  // `ParquetValue` with no `kind` set) is a SQL NULL — i.e. an OPTIONAL
  // parquet column with no value in this row.
  map<string, ParquetValue> columns = 1;
}

// A single typed parquet cell value.
//
// The `kind` oneof encodes the column's semantic type. The mapping to/from
// parquet physical+logical types is:
//
//   read  (parquet -> ParquetValue)        write (ParquetValue -> parquet)
//   ------------------------------------   --------------------------------
//   INT32                       int32      INT32
//   INT32 + DATE                date       INT32 + DATE
//   INT64                       int64      INT64
//   INT64 + TIMESTAMP_*         timestamp  INT64 + TIMESTAMP(UTC, MICROS)
//   FLOAT                       float      FLOAT
//   DOUBLE                      double     DOUBLE
//   BOOLEAN                     bool       BOOLEAN
//   BINARY + STRING/ENUM/JSON   string     BINARY + STRING
//   BINARY (raw)                bytes      BINARY
//   FIXED_LEN_BYTE_ARRAY        bytes      BINARY
//   INT96                       bytes      BINARY
//
// The read side is intentionally lossy: three physical byte types collapse
// to `bytes` and three timestamp precisions collapse to `timestamp`. The
// write side therefore picks a canonical physical type per `kind` (right
// column). Round-trips are value-preserving, not parquet-physical-preserving.
message ParquetValue {
  // An unset `kind` represents a NULL value.
  oneof kind {
    int32 int32_value = 1;
    int64 int64_value = 2;
    float float_value = 3;
    double double_value = 4;
    bool bool_value = 5;
    string string_value = 6;
    bytes bytes_value = 7;
    google.protobuf.Timestamp timestamp_value = 8;
    google.type.Date date_value = 9;
  }
}
